<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인정보 공유 목록</title>
    <style>
        table { border-collapse: collapse; margin: 20px auto; font-family: Arial, sans-serif; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; vertical-align: top; }
        th { font-weight: bold; text-align: center; background-color: #f5f5f5; word-break: break-all; white-space: normal; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; background-color: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .main { padding: 2rem 0; }
        .content { background: white; padding: 3rem; border-radius: 8px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 34px; font-weight: 600; color: black; margin-bottom: 0.5rem; line-height: 1.3; text-align: center; }
        .update-date { color: #666; font-size: 14px; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; text-align: center; }
        .section { margin-bottom: 2rem; }
        .section p { margin-bottom: 1rem; text-align: justify; color: #555; font-size: 16px; line-height: 1.8; }
        .weight-bold { color: black; font-weight: 600; }
        @media (max-width: 768px) { .content { padding: 2rem 1.5rem; margin: 0 1rem; } h1 { font-size: 24px; } .section p { font-size: 15px; } }
        @media (max-width: 600px) { table { display: block; overflow-x: auto; white-space: nowrap; } th, td { min-width: 120px; } }
        @media (max-width: 480px) { .container { padding: 0 15px; } .content { padding: 1.5rem 1rem; margin: 0 0.5rem; } h1 { font-size: 22px; } }
    </style>
</head>
<body>
    <main class="main">
        <div class="container">
            <div class="content">
                <h1>개인정보 공유 목록</h1>
                <div class="section">
                    <p>일부 서비스를 제공하기 위해 당사는 귀하의 개인정보를 제3자에게 제공해야 합니다. 귀하의 데이터 안전과 프라이버시를 보호하기 위해 당사는 파트너와 데이터 보안 보호 계약을 체결하여 파트너의 귀하의 데이터 보호 책임, 의무 및 요구사항을 명확히 했습니다. 자세한 내용은 다음 <span class="weight-bold">제3자 정보 공유 목록</span>을 참조하시기 바랍니다.
                    </p>
                </div>
                <div class="section">
                    <table>
                        <thead>
                            <tr><th>제3자 이름</th><th>처리 목적 및 방식</th><th>관련 개인정보 유형</th><th>제3자 공식 웹사이트 링크 및 개인정보처리방침 링크</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>없음</td><td>없음</td><td>없음</td><td>없음</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
